name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Remove private names, addresses, tokens, and sensitive configuration.
  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
    validations:
      required: true
  - type: input
    id: integration_version
    attributes:
      label: Entity Dependency Engine version
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: text
